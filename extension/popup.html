<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <style>
    :root {
      --bg:        #f2f2f7;
      --card:      #ffffff;
      --label:     #000000;
      --secondary: #6c6c70;
      --sep:       rgba(60, 60, 67, 0.18);
      --accent:    #007aff;
      --tog-off:   #e5e5ea;
      --tog-on:    #34c759;
      --pressed:   rgba(0, 0, 0, 0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #000000;
        --card:      #1c1c1e;
        --label:     #ffffff;
        --secondary: #8e8e93;
        --sep:       rgba(84, 84, 88, 0.6);
        --tog-off:   #39393c;
        --pressed:   rgba(255, 255, 255, 0.08);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: var(--bg);
      color: var(--label);
      width: 300px;
      padding-bottom: 20px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Title ─────────────────────────────── */
    .page-title {
      padding: 16px 16px 4px;
      font-size: 13px;
      font-weight: 500;
      color: var(--secondary);
      letter-spacing: -0.1px;
    }

    /* ── Section ───────────────────────────── */
    .section { margin: 14px 0 0; padding: 0 16px; }

    .section-header {
      font-size: 11px;
      font-weight: 400;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.55px;
      padding: 0 4px 6px;
    }

    .section-body {
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
    }

    /* ── Row ────────────────────────────────── */
    .row {
      display: flex;
      align-items: center;
      padding: 0 12px 0 12px;
      height: 44px;
      position: relative;
      cursor: pointer;
      user-select: none;
    }
    .row:active { background: var(--pressed); }

    .row + .row::before {
      content: '';
      position: absolute;
      top: 0; left: 52px; right: 0;
      height: 0.5px;
      background: var(--sep);
    }

    .row-icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .row-label {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      color: var(--label);
      letter-spacing: -0.2px;
    }

    /* ── Checkmark ──────────────────────────── */
    .row-check {
      color: var(--accent);
      width: 20px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-left: 4px;
    }
    .row-check .check-icon {
      opacity: 0; transform: scale(0.5);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .row-check.selected .check-icon {
      opacity: 1; transform: scale(1);
    }

    /* ── Toggle ─────────────────────────────── */
    .toggle {
      position: relative;
      width: 51px; height: 31px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--tog-off);
      border-radius: 31px;
      transition: background 0.22s ease;
      cursor: pointer;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      width: 27px; height: 27px;
      border-radius: 50%;
      background: #fff;
      top: 2px; left: 2px;
      transition: transform 0.22s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.26), 0 1px 2px rgba(0, 0, 0, 0.1);
    }
    .toggle input:checked + .toggle-track { background: var(--tog-on); }
    .toggle input:checked + .toggle-track::after { transform: translateX(20px); }

    /* ── Footer note ────────────────────────── */
    .section-footer {
      font-size: 11px;
      color: var(--secondary);
      padding: 6px 4px 0;
      line-height: 1.45;
    }
    .section-footer code {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 10.5px;
      background: rgba(120, 120, 128, 0.16);
      padding: 1px 4px;
      border-radius: 4px;
    }

    /* ── Toast ──────────────────────────────── */
    .saved-toast {
      position: fixed;
      bottom: 12px; left: 50%;
      transform: translateX(-50%) translateY(48px);
      background: rgba(44, 44, 46, 0.9);
      color: #fff;
      font-size: 12px; font-weight: 500;
      padding: 7px 16px;
      border-radius: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.22s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.22s ease;
      opacity: 0; white-space: nowrap;
    }
    .saved-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <div class="page-title">GitHub PR Approved Viewer</div>

  <!-- ── Sort Order ──────────────────────── -->
  <div class="section">
    <div class="section-header">表示順</div>
    <div class="section-body">

      <div class="row sort-row" data-value="default">
        <div class="row-icon" style="background:#5856d6;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="15" height="15" fill="white">
            <path d="M2 2.75C2 1.784 2.784 1 3.75 1h5.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v8.586A1.75 1.75 0 0 1 12.25 16h-8.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v11.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 8 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/>
          </svg>
        </div>
        <div class="row-label">Default</div>
        <div class="row-check selected">
          <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="18" height="18" fill="currentColor">
            <path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-6.25 6.25a.75.75 0 0 1-1.06 0L2.22 7.28a.75.75 0 1 1 1.06-1.06L7 9.94l5.72-5.72a.75.75 0 0 1 1.06 0Z"/>
          </svg>
        </div>
      </div>

      <div class="row sort-row" data-value="codeowners">
        <div class="row-icon" style="background:#ff9500;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="15" height="15" fill="white">
            <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L6.5 5.44l1.72-1.72a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L7.56 6.5l1.72 1.72a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L6.5 7.56l-1.72 1.72a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L5.44 6.5 3.72 4.78a.75.75 0 0 1 0-1.06Zm4.5 6a.75.75 0 0 1 1.06 0l3.25 3.25a.75.75 0 1 1-1.06 1.06l-3.25-3.25a.75.75 0 0 1 0-1.06Zm1.78-1.78a.75.75 0 0 1 0 1.06l-1.5 1.5a.75.75 0 0 1-1.06-1.06l1.5-1.5a.75.75 0 0 1 1.06 0Z"/>
          </svg>
        </div>
        <div class="row-label">Sort by CODEOWNERS file</div>
        <div class="row-check">
          <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="18" height="18" fill="currentColor">
            <path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-6.25 6.25a.75.75 0 0 1-1.06 0L2.22 7.28a.75.75 0 1 1 1.06-1.06L7 9.94l5.72-5.72a.75.75 0 0 1 1.06 0Z"/>
          </svg>
        </div>
      </div>

      <div class="row sort-row" data-value="atoz">
        <div class="row-icon" style="background:#34c759;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="15" height="15" fill="white">
            <path d="M.75 3.25a.75.75 0 0 1 .75.75v8a.75.75 0 0 1-1.5 0V4A.75.75 0 0 1 .75 3.25Zm4.5 3a.75.75 0 0 1 .75.75v5a.75.75 0 0 1-1.5 0V7A.75.75 0 0 1 5.25 6.25Zm4.5-3.5a.75.75 0 0 1 .75.75V12a.75.75 0 0 1-1.5 0V3.5a.75.75 0 0 1 .75-.75Zm4.5 6a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V9.5a.75.75 0 0 1 .75-.75Z"/>
          </svg>
        </div>
        <div class="row-label">A to Z</div>
        <div class="row-check">
          <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="18" height="18" fill="currentColor">
            <path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-6.25 6.25a.75.75 0 0 1-1.06 0L2.22 7.28a.75.75 0 1 1 1.06-1.06L7 9.94l5.72-5.72a.75.75 0 0 1 1.06 0Z"/>
          </svg>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Options ──────────────────────────── -->
  <div class="section">
    <div class="section-header">オプション</div>
    <div class="section-body">
      <div class="row" style="cursor:default;">
        <div class="row-icon" style="background:#007aff;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="15" height="15" fill="white">
            <path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Zm4.879-2.773 4.264 2.559a.25.25 0 0 1 0 .428l-4.264 2.559A.25.25 0 0 1 6 10.559V5.442a.25.25 0 0 1 .379-.215Z"/>
          </svg>
        </div>
        <label class="row-label" for="wildcardFirst" style="cursor:pointer;">* を常に先頭に表示</label>
        <label class="toggle" for="wildcardFirst">
          <input type="checkbox" id="wildcardFirst">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
    <div class="section-footer">有効にすると <code>*</code> のルールを表示順に関わらず常に先頭に固定します。</div>
  </div>

  <div class="saved-toast" id="savedToast">保存しました</div>

  <script src="popup.js"></script>
</body>
</html>
